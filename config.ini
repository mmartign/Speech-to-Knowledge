# vmodel_name = gemma3:4b
vmodel_name = medgemma-1.5:4b
# model_name = gpt-oss:latest
# model_name = medgemma:27b
# model_name = gemma4:e4b
model_name = gemma4:26b

[analysis]
knowledge_base_ids = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx,xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

[prompts]
prompt = Please, begin by extracting the medical data from the following text and converting it into a FHIR compliant JSON resource bundle. After that, verify whether the operators have adhered to any of the attached protocols. If you cannot find any protocol or the attached protocols are not relevant to the specific case, please search for suitable protocols on the Web.
# prompt = Please, begin by translating the text from Italian to English. After that, extract the medical data from the translated text and convert it into a FHIR compliant JSON resource bundle. Finally, verify whether the operators have adhered to any of the attached protocols.  If you cannot find any protocol or the attached protocols are not relevant to the specific case, please search for suitable protocols on the Web.
# prompt = Please, begin by translating the text from French to English. After that, extract the medical data from the translated text and convert it into a FHIR compliant JSON resource bundle. Finally, verify whether the operators have adhered to any of the attached protocols. If you cannot find any protocol or the attached protocols are not relevant to the specific case, please search for suitable protocols on the Web.
# prompt = Please, begin by translating the text from Hebrew to English. After that, extract the medical data from the translated text and convert it into a FHIR compliant JSON resource bundle. Finally, verify whether the operators have adhered to any of the attached protocols. If you cannot find any protocol or the attached protocols are not relevant to the specific case, please search for suitable protocols on the Web.
temp_prompt = Please, verify whether the operators have adhered to any of the attached protocols. If you cannot find any protocol or the attached protocols are not relevant to the specific case, please search for suitable protocols on the Web. Please produce a very short answer.
[triggers]
start = Start recording
stop = Stop recording
temp_check = Check now
# start = Comincia a registrare
# stop = Termina di registrare
# temp_check = Controlla adesso
# start = Commence à enregistrer
# stop = Termine à enregistrer
# temp_check = Vérifier maintenant
# start = התחל להקליט
# stop = הפסק להקליט
# temp_check = בדוק עכשיו
[tts]
command = say

[deterministic_mapper]
network_enabled = true
cache_dir = ./terminology_cache
cache_ttl_days = 7
loinc_user = user_name
loinc_pass = user_password
timeout_seconds = 10
